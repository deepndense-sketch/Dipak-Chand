<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donation Admin Login</title>
  <link rel="stylesheet" href="./assets/css/donation-system.css?v=21">
</head>
<body class="backend-body">
  <main class="backend-shell">
    <header class="backend-topbar">
      <div class="backend-brand">
        <h1>Donation Admin Login</h1>
        <p>Log in with an approved account to open the donation form page.</p>
      </div>
      <nav class="backend-nav">
        <a class="secondary" href="./index.html" target="_blank" rel="noopener">Website</a>
      </nav>
    </header>

    <section class="backend-grid" id="authArea">
      <div class="backend-panel" id="loginPanel">
        <h2>Approved Admin Login</h2>
        <p class="backend-help">Use the username/email and password provided by the main administrator.</p>
        <div class="form-grid">
          <label class="full">Username or email
            <input id="adminLogin" autocomplete="username">
          </label>
          <label class="full">Password
            <input id="adminPassword" type="password" autocomplete="current-password">
          </label>
          <label class="full">GitHub token for publishing donation data
            <input id="adminToken" type="password" autocomplete="off" placeholder="Saved locally in this browser">
          </label>
        </div>
        <div class="action-row">
          <button type="button" id="adminLoginBtn">Login</button>
        </div>
        <div class="status-line" id="loginStatus"></div>
      </div>
    </section>
  </main>

  <script src="./assets/js/donation-system.js?v=17"></script>
  <script>
    const cms = window.DipakCMS;

    function setStatus(text, type = '') {
      const el = document.getElementById('loginStatus');
      el.className = `status-line ${type}`;
      el.textContent = text;
    }

    async function login() {
      try {
        const all = await cms.loadAllData();
        const loginValue = document.getElementById('adminLogin').value.trim().toLowerCase();
        const passwordHash = await cms.sha256(document.getElementById('adminPassword').value);
        const token = cms.rememberToken(document.getElementById('adminToken').value);
        const admin = (all.users.approved || []).find((user) =>
          ((user.email || '').toLowerCase() === loginValue || (user.username || '').toLowerCase() === loginValue) && user.passwordHash === passwordHash
        );
        if (!admin) throw new Error('Login failed or account is not approved yet.');
        cms.sessionSet('dipakDonationAdmin', { ...admin, token });
        setStatus('Login successful. Opening donation form...', 'good');
        window.location.href = './admin-form.html';
      } catch (error) {
        setStatus(error.message, 'bad');
      }
    }

    document.getElementById('adminLoginBtn').addEventListener('click', login);
    document.getElementById('adminPassword').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') login();
    });
    document.getElementById('adminToken').value = cms.getRememberedToken();
  </script>
</body>
</html>
