<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Dipak Chand - Donation Detail</title>
  <link rel="stylesheet" href="./assets/css/donation-system.css?v=26">
</head>
<body>
  <main class="card">
    <section class="hero">
      <header class="public-site-header">
      <a class="site-title" href="./index.html">Save Dipak Chand</a>
      <nav class="site-actions" aria-label="Main navigation">
        <a class="nav-button" href="./index.html">Home</a>
        <a class="nav-button" href="./about.html">About Dipak</a>
        <a class="nav-button" href="./donate.html">Donate</a>
      </nav>
    </header>
    </section>
    <section class="section">
      <article class="detail-panel" id="detailMount">
        <p class="empty-state">Loading donation details...</p>
      </article>
    </section>
  </main>

  <script src="./assets/js/donation-system.js?v=17"></script>
  <script>
    const cms = window.DipakCMS;
    const mount = document.getElementById('detailMount');
    const id = new URLSearchParams(location.search).get('id');

    Promise.all([
      cms.readJson(cms.DATA_PATHS.site, { title: cms.DEFAULT_SITE_TITLE, targetAmount: 5000000, currency: 'Rs' }),
      cms.loadDonationDetail(id)
    ]).then(([site, entry]) => {
      const siteTitle = site.title || cms.DEFAULT_SITE_TITLE || 'Save Dipak Chand';
      if (!entry || entry.status !== 'published') {
        mount.innerHTML = '<h1>Donation not found</h1><p class="empty-state">This donation page is not published or the link is incorrect.</p>';
        document.title = `${siteTitle} - Donation not found`;
        return;
      }
      const profileImage = entry.profileImage || (entry.images || [])[0] || null;
      const otherImages = entry.otherImages || (entry.images || []).slice(profileImage ? 1 : 0);
      document.title = `${siteTitle} - ${entry.donorName}`;
      mount.innerHTML = `
        <section class="detail-hero ${profileImage ? 'with-profile' : ''}">
          ${profileImage ? `<div class="detail-profile-photo"><img src="${profileImage.dataUrl}" alt="${profileImage.name || entry.donorName}" style="object-position:${profileImage.focusX || 50}% ${profileImage.focusY || 50}%; transform:scale(${profileImage.zoom || 1})"></div>` : ''}
          <div>
            <span class="chip">${entry.adminName || 'Admin'}</span>
            <h1>${entry.donorName}</h1>
            <div class="detail-amount">${cms.money(entry.amount, site.currency)}</div>
            ${entry.address ? `<p class="detail-address"><strong>Address:</strong> ${entry.address}</p>` : ''}
          </div>
        </section>
        <section>
          <h2>Donation Information</h2>
          <p>${(entry.info || 'No additional information provided.').replace(/\n/g, '<br>')}</p>
        </section>
        ${otherImages.length ? `<section><h2>Photos</h2><div class="image-grid">${otherImages.map((image) => `<img src="${image.dataUrl}" alt="${image.name || entry.donorName}">`).join('')}</div></section>` : ''}
      `;
    }).catch((error) => {
      mount.innerHTML = '<h1>Unable to load donation</h1><p class="empty-state">Please try again later.</p>';
      console.error(error);
    });
  </script>
</body>
</html>
