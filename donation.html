<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Dipak Chand - Donation Detail</title>
  <link rel="stylesheet" href="./assets/css/donation-system.css?v=30">
</head>
<body>
  <main class="card">
    <section class="hero">
      <header class="public-site-header">
      <a class="site-title" href="./index.html">Save Dipak Chand</a>
      <nav class="site-actions" aria-label="Main navigation">
        <a class="nav-button" href="./index.html">Home</a>
        <a class="nav-button" href="./about.html">About Dipak</a>
        <a class="nav-button" href="./donate.html">Donate</a>
        <a class="nav-button facebook-share-button" href="#" data-facebook-share>Share on Facebook</a>
      </nav>
    </header>
      <div class="hero-photos">
        <div class="photo photo-left" aria-label="Deepak portrait"></div>
        <div class="photo photo-right" aria-label="Deepak in hospital"></div>
      </div>
      <div class="badge">सहयोगको अपिल</div>
      <h1>जीवन बचाउन अत्यन्त जरुरी सहयोगको अपिल</h1>
      <p class="lead">Thank you for your generous donation to support Deepak Chand in his fight against blood cancer. Your kindness means a lot.</p>
    </section>
    <section class="section">
      <article class="detail-panel" id="detailMount">
        <p class="empty-state">Loading donation details...</p>
      </article>
    </section>
  </main>

  <script src="./assets/js/donation-system.js?v=19"></script>
  <script>
    const cms = window.DipakCMS;
    const mount = document.getElementById('detailMount');
    const id = new URLSearchParams(location.search).get('id');

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      })[char]);
    }

    Promise.all([
      cms.readJson(cms.DATA_PATHS.site, { title: cms.DEFAULT_SITE_TITLE, targetAmount: 5000000, currency: 'Rs' }),
      cms.loadDonationDetail(id)
    ]).then(([site, entry]) => {
      const siteTitle = site.title || cms.DEFAULT_SITE_TITLE || 'Save Dipak Chand';
      if (!entry || entry.status !== 'published') {
        mount.innerHTML = '<h1>Donation not found</h1><p class="empty-state">This donation page is not published or the link is incorrect.</p>';
        document.title = `${siteTitle} - Donation not found`;
        return;
      }
      const profileImage = entry.profileImage || (entry.images || [])[0] || null;
      const otherImages = entry.otherImages || (entry.images || []).slice(profileImage ? 1 : 0);
      const thankYouNote = `Dear ${entry.donorName},

With heartfelt gratitude, we sincerely thank you for your generous donation to support Dipak, who is bravely fighting blood cancer. Your kindness and compassion have brought hope, comfort, and strength during this challenging time.

Your contribution is more than financial support—it represents care, solidarity, and encouragement for Dipak and his loved ones as they face medical treatment and recovery. Because of compassionate individuals like you, difficult journeys become a little easier and filled with hope.

On behalf of Dipak Chand and everyone involved, we deeply appreciate your generosity, trust, and support. Your kindness will always be remembered and cherished.`;
      document.title = `${siteTitle} - ${entry.donorName}`;
      mount.innerHTML = `
        <section class="detail-hero ${profileImage ? 'with-profile' : ''}">
          ${profileImage ? `<div class="detail-profile-photo"><img src="${profileImage.dataUrl}" alt="${profileImage.name || entry.donorName}" style="object-position:${profileImage.focusX || 50}% ${profileImage.focusY || 50}%; transform:scale(${profileImage.zoom || 1})"></div>` : ''}
          <div>
            <span class="chip">${entry.adminName || 'Admin'}</span>
            <h1>${entry.donorName}</h1>
            <div class="detail-amount">${cms.money(entry.amount, site.currency)}</div>
            ${entry.address ? `<p class="detail-address"><strong>Address:</strong> ${entry.address}</p>` : ''}
          </div>
        </section>
        <section class="thank-you-note">
          <h2>Thank You Note</h2>
          <p>${thankYouNote.replace(/\n/g, '<br>')}</p>
        </section>
        <div class="detail-share-row">
          <button class="complete-list-link facebook-share-button" type="button" id="showFacebookShareText">Share this donation on Facebook</button>
        </div>
        <section class="facebook-share-panel" id="facebookSharePanel" hidden>
          <h2>Facebook Post Text</h2>
          <textarea id="facebookShareText" readonly>${escapeHtml(thankYouNote)}</textarea>
          <div class="detail-share-row">
            <button class="secondary" type="button" id="copyFacebookShareText">Copy Text</button>
            <a class="complete-list-link facebook-share-button" href="${cms.facebookShareHref(location.href)}" target="_blank" rel="noopener">Open Facebook</a>
          </div>
          <p class="backend-help" id="facebookShareStatus">Copy this text, then paste it into your Facebook post after Facebook opens.</p>
        </section>
        <section>
          <h2>Donation Information</h2>
          <p>${(entry.info || 'No additional information provided.').replace(/\n/g, '<br>')}</p>
        </section>
        ${otherImages.length ? `<section><h2>Photos</h2><div class="image-grid">${otherImages.map((image) => `<img src="${image.dataUrl}" alt="${image.name || entry.donorName}">`).join('')}</div></section>` : ''}
      `;
      const sharePanel = document.getElementById('facebookSharePanel');
      const shareText = document.getElementById('facebookShareText');
      const shareStatus = document.getElementById('facebookShareStatus');
      async function copyShareText() {
        shareText.focus();
        shareText.select();
        try {
          await navigator.clipboard.writeText(thankYouNote);
          shareStatus.textContent = 'Thank-you text copied. Paste it into the Facebook post box.';
        } catch (error) {
          document.execCommand('copy');
          shareStatus.textContent = 'Thank-you text selected. Copy it, then paste it into the Facebook post box.';
        }
      }
      document.getElementById('showFacebookShareText').addEventListener('click', async () => {
        sharePanel.hidden = false;
        await copyShareText();
      });
      document.getElementById('copyFacebookShareText').addEventListener('click', copyShareText);
    }).catch((error) => {
      mount.innerHTML = '<h1>Unable to load donation</h1><p class="empty-state">Please try again later.</p>';
      console.error(error);
    });
  </script>
</body>
</html>
