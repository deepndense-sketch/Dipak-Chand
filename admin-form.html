<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donation Entry Form</title>
  <link rel="stylesheet" href="./assets/css/donation-system.css?v=13">
</head>
<body class="backend-body">
  <main class="backend-shell">
    <header class="backend-topbar">
      <div class="backend-brand">
        <h1 id="dashboardTitle">Donation Form</h1>
        <p>Add new donation entries, publish them to the public website, or keep them as drafts.</p>
      </div>
      <nav class="backend-nav">
        <a class="secondary" href="./index.html" target="_blank" rel="noopener">Website</a>
        <button type="button" class="secondary" id="logoutBtn">Logout</button>
      </nav>
    </header>

    <section class="backend-grid" id="workArea" hidden>
      <div class="backend-panel">
        <h2>Donation Info Form</h2>
        <input id="donationId" type="hidden">
        <div class="form-grid">
          <label>Donor Name
            <input id="donorName" placeholder="Donor name">
          </label>
          <label>Amount Donated
            <input id="donorAmount" type="number" min="0" step="1" placeholder="5000">
          </label>
          <label class="full">Address
            <input id="donorAddress" placeholder="Donor address">
          </label>
          <label class="full">Information
            <textarea id="donorInfo" placeholder="Write donation details, message, date, receipt notes, etc."></textarea>
          </label>
          <label>Status
            <select id="donorStatus">
              <option value="published">Publish</option>
              <option value="draft">Draft</option>
            </select>
          </label>
          <label class="visually-hidden">Timeline color
            <input id="donorColor" type="color" value="#176b87">
          </label>
          <label class="full">Profile photo
            <input id="profileImage" type="file" accept="image/*">
          </label>
          <label class="full">Other images
            <input id="otherImages" type="file" accept="image/*" multiple>
          </label>
        </div>
        <div class="upload-preview-layout">
          <div>
            <h3>Profile Photo</h3>
            <div id="profilePreview" class="preview-grid face-preview-grid"></div>
          </div>
          <div>
            <h3>Other Images</h3>
            <div id="otherPreview" class="preview-grid gallery-preview-grid"></div>
          </div>
        </div>
        <div class="action-row">
          <button type="button" id="saveDonationBtn">Save Donation</button>
          <button type="button" class="secondary" id="newDonationBtn">New Entry</button>
        </div>
        <div class="status-line" id="donationStatus"></div>
      </div>

      <div class="backend-panel">
        <h2>All Entries</h2>
        <div class="metrics-grid" id="adminMetrics"></div>
        <div class="action-row" id="completeListRow" hidden></div>
        <div id="donationList" class="table-list"></div>
        <div class="action-row" id="showMoreEntriesRow" hidden>
          <button type="button" class="secondary" id="showMoreEntriesBtn">See more</button>
        </div>
      </div>
    </section>

    <section class="backend-panel" id="notLoggedIn" hidden>
      <h2>Login Required</h2>
      <p class="backend-help">Please log in first to open the donation form.</p>
      <div class="action-row">
        <a class="button" href="./admin-data.html">Go to Login</a>
      </div>
    </section>
  </main>

  <script src="./assets/js/donation-system.js?v=14"></script>
  <script>
    const cms = window.DipakCMS;
    let usersData = null;
    let donationData = null;
    let siteData = null;
    let currentAdmin = null;
    let profileImage = null;
    let otherImages = [];
    let visibleEntryCount = 10;
    const LOCAL_PENDING_DONATIONS_KEY = 'dipakPendingDonationEntries';
    const LOCAL_HIDDEN_DONATIONS_KEY = 'dipakHiddenDonationEntries';

    function setStatus(id, text, type = '') {
      const el = document.getElementById(id);
      el.className = `status-line ${type}`;
      el.textContent = text;
    }

    function readLocalJson(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
      } catch (error) {
        return fallback;
      }
    }

    function writeLocalJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function getHiddenDonations() {
      return readLocalJson(LOCAL_HIDDEN_DONATIONS_KEY, {});
    }

    function setHiddenDonations(hidden) {
      writeLocalJson(LOCAL_HIDDEN_DONATIONS_KEY, hidden);
    }

    function rememberHiddenDonation(id) {
      const hidden = getHiddenDonations();
      hidden[id] = Date.now();
      setHiddenDonations(hidden);
    }

    function forgetHiddenDonation(id) {
      const hidden = getHiddenDonations();
      delete hidden[id];
      setHiddenDonations(hidden);
    }

    function applyLocalDonationDisplay(serverDonations) {
      localStorage.removeItem(LOCAL_PENDING_DONATIONS_KEY);
      const serverIds = new Set(serverDonations.map((entry) => entry.id));
      const hidden = getHiddenDonations();
      Object.keys(hidden).forEach((id) => {
        if (!serverIds.has(id)) delete hidden[id];
      });
      setHiddenDonations(hidden);

      const hiddenIds = new Set(Object.keys(hidden));
      return serverDonations.filter((entry) => !hiddenIds.has(entry.id));
    }

    async function verifyDonationSaved(id) {
      const detail = await cms.loadGithubJson(cms.donationDetailPath(id), currentAdmin.token);
      if (detail.id !== id) throw new Error('GitHub accepted the request but the donation detail file could not be verified. Please click Save Donation again.');
      const latest = await cms.loadGithubJson(cms.DATA_PATHS.donationsIndex, currentAdmin.token);
      const saved = (latest.donations || []).some((entry) => entry.id === id);
      if (!saved) throw new Error('GitHub accepted the request but the donation was not found in the database. Please click Save Donation again.');
      return latest;
    }

    async function reloadData() {
      const all = await cms.loadAllData();
      usersData = all.users;
      donationData = { donations: applyLocalDonationDisplay(all.donations || []) };
      siteData = all.site;
    }

    function clearForm() {
      document.getElementById('donationId').value = '';
      document.getElementById('donorName').value = '';
      document.getElementById('donorAmount').value = '';
      document.getElementById('donorAddress').value = '';
      document.getElementById('donorInfo').value = '';
      document.getElementById('donorStatus').value = 'published';
      document.getElementById('donorColor').value = cms.DONOR_COLORS[Math.floor(Math.random() * cms.DONOR_COLORS.length)];
      document.getElementById('profileImage').value = '';
      document.getElementById('otherImages').value = '';
      profileImage = null;
      otherImages = [];
      renderPreview();
    }

    function renderPreview() {
      const profileMount = document.getElementById('profilePreview');
      profileMount.innerHTML = profileImage ? `
        <div class="face-preview-card">
          <div class="face-frame">
            <img src="${profileImage.dataUrl}" alt="${profileImage.name}" style="object-position:${profileImage.focusX || 50}% ${profileImage.focusY || 50}%; transform:scale(${profileImage.zoom || 1})">
          </div>
          <div class="face-controls">
            <label>Move left/right
              <input type="range" min="0" max="100" value="${profileImage.focusX || 50}" data-profile-focus-x>
            </label>
            <label>Move up/down
              <input type="range" min="0" max="100" value="${profileImage.focusY || 50}" data-profile-focus-y>
            </label>
            <label>Zoom
              <input type="range" min="1" max="2.5" step="0.05" value="${profileImage.zoom || 1}" data-profile-zoom>
            </label>
          </div>
        </div>` : '<p class="empty-state">Optional profile photo.</p>';

      const otherMount = document.getElementById('otherPreview');
      otherMount.innerHTML = otherImages.length ? otherImages.map((image) => `
        <div class="gallery-preview-card">
          <img src="${image.dataUrl}" alt="${image.name}">
          <span>${image.name}</span>
        </div>`).join('') : '<p class="empty-state">Optional additional images.</p>';
    }

    function fileToDataUrl(file, maxSize = 1400) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const image = new Image();
        image.onload = () => {
          const scale = Math.min(1, maxSize / Math.max(image.naturalWidth, image.naturalHeight));
          const canvas = document.createElement('canvas');
          canvas.width = Math.max(1, Math.round(image.naturalWidth * scale));
          canvas.height = Math.max(1, Math.round(image.naturalHeight * scale));
          const context = canvas.getContext('2d');
          context.drawImage(image, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);
          resolve({ id: cms.uid('image'), name: file.name, dataUrl: canvas.toDataURL('image/jpeg', 0.78), focusX: 50, focusY: 50, zoom: 1 });
        };
        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error(`Could not load image ${file.name}`));
        };
        image.src = url;
      });
    }

    async function saveDonation() {
      let previousDonations;
      const saveButton = document.getElementById('saveDonationBtn');
      try {
        saveButton.disabled = true;
        if (!currentAdmin?.token) throw new Error('GitHub token is required to publish donation data.');
        const approvedAdmin = (usersData.approved || []).find((user) => user.id === currentAdmin.id);
        if (!approvedAdmin) throw new Error('This admin account is no longer approved. Please log in again.');
        currentAdmin = { ...approvedAdmin, token: currentAdmin.token };
        cms.sessionSet('dipakDonationAdmin', currentAdmin);
        const donorName = document.getElementById('donorName').value.trim();
        const amount = Number(document.getElementById('donorAmount').value || 0);
        if (!donorName || !amount) throw new Error('Donor name and amount are required.');
        const id = document.getElementById('donationId').value || cms.uid(cms.slugify(donorName));
        const status = document.getElementById('donorStatus').value;
        const existing = (donationData.donations || []).find((entry) => entry.id === id);
        const entry = {
          ...(existing || {}),
          id,
          donorName,
          amount,
          address: document.getElementById('donorAddress').value.trim(),
          info: document.getElementById('donorInfo').value.trim(),
          color: document.getElementById('donorColor').value,
          status,
          adminId: currentAdmin.id,
          adminName: currentAdmin.username,
          profileImage,
          otherImages,
          createdAt: existing?.createdAt || new Date().toISOString(),
          updatedAt: new Date().toISOString(),
          publishedAt: status === 'published' ? (existing?.publishedAt || new Date().toISOString()) : existing?.publishedAt || null
        };
        previousDonations = [...(donationData.donations || [])];
        const summary = cms.donationSummary(entry);
        forgetHiddenDonation(id);
        donationData.donations = [summary, ...previousDonations.filter((item) => item.id !== id)];
        renderDonations();
        setStatus('donationStatus', 'Saving donation entry...', 'good');
        await cms.saveJson(cms.donationDetailPath(id), entry, currentAdmin.token, `${status === 'published' ? 'Publish' : 'Save draft'} donation detail from ${donorName}`);
        await cms.updateJson(cms.DATA_PATHS.donationsIndex, { donations: [] }, currentAdmin.token, `${status === 'published' ? 'Publish' : 'Save draft'} donation from ${donorName}`, (latest) => {
          latest.donations = [summary, ...((latest.donations || []).filter((item) => item.id !== id))];
          latest.updatedAt = new Date().toISOString();
          return latest;
        });
        const verifiedIndex = await verifyDonationSaved(id);
        donationData.donations = applyLocalDonationDisplay(verifiedIndex.donations || []);
        renderDonations();
        setStatus('donationStatus', 'Donation entry saved and website data updated.', 'good');
        clearForm();
      } catch (error) {
        if (previousDonations) {
          donationData.donations = previousDonations;
          renderDonations();
        }
        setStatus('donationStatus', error.message, 'bad');
      } finally {
        saveButton.disabled = false;
      }
    }

    async function deleteDonation(id) {
      let previousDonations;
      try {
        if (!currentAdmin?.token) throw new Error('GitHub token is required to delete donation data.');
        const entry = (donationData.donations || []).find((item) => item.id === id);
        if (!entry) return;
        if (!confirm(`Delete donation entry for ${entry.donorName}? This will remove it from the website data.`)) return;
        previousDonations = [...(donationData.donations || [])];
        rememberHiddenDonation(id);
        donationData.donations = previousDonations.filter((item) => item.id !== id);
        setStatus('donationStatus', 'Deleting donation entry...', 'good');
        renderDonations();
        await cms.updateJson(cms.DATA_PATHS.donationsIndex, { donations: [] }, currentAdmin.token, `Delete donation from ${entry.donorName}`, (latest) => {
          latest.donations = (latest.donations || []).filter((item) => item.id !== id);
          latest.updatedAt = new Date().toISOString();
          return latest;
        });
        await cms.deleteJson(cms.donationDetailPath(id), currentAdmin.token, `Delete donation detail from ${entry.donorName}`).catch(() => null);
        setStatus('donationStatus', 'Donation entry deleted and website data updated.', 'good');
        clearForm();
      } catch (error) {
        forgetHiddenDonation(id);
        if (previousDonations) {
          donationData.donations = previousDonations;
          renderDonations();
        }
        setStatus('donationStatus', error.message, 'bad');
      }
    }

    async function editDonation(id) {
      const entry = await cms.loadDonationDetail(id);
      if (!entry) return;
      document.getElementById('donationId').value = entry.id;
      document.getElementById('donorName').value = entry.donorName || '';
      document.getElementById('donorAmount').value = entry.amount || '';
      document.getElementById('donorAddress').value = entry.address || '';
      document.getElementById('donorInfo').value = entry.info || '';
      document.getElementById('donorStatus').value = entry.status || 'draft';
      document.getElementById('donorColor').value = entry.color || '#176b87';
      profileImage = entry.profileImage || (entry.images || [])[0] || null;
      if (profileImage && !profileImage.zoom) profileImage.zoom = 1;
      otherImages = entry.otherImages || (entry.images || []).slice(profileImage ? 1 : 0);
      renderPreview();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderDonations() {
      const allEntries = cms.sortDonationsNewest(donationData.donations || []);
      const own = allEntries.filter((entry) => entry.adminId === currentAdmin.id);
      const publishedTotal = own.filter((entry) => entry.status === 'published').reduce((sum, entry) => sum + Number(entry.amount || 0), 0);
      const allPublished = allEntries.filter((entry) => entry.status === 'published');
      const allTotal = allPublished.reduce((sum, entry) => sum + Number(entry.amount || 0), 0);
      const listLimit = visibleEntryCount;
      const completeRow = document.getElementById('completeListRow');
      completeRow.hidden = allPublished.length <= 0;
      completeRow.innerHTML = allPublished.length
        ? `<a class="button secondary" href="donations-list.html">View complete list (${allPublished.length})</a>`
        : '';
      const showMoreRow = document.getElementById('showMoreEntriesRow');
      const showMoreBtn = document.getElementById('showMoreEntriesBtn');
      const remainingEntries = Math.max(0, allEntries.length - visibleEntryCount);
      showMoreRow.hidden = !remainingEntries;
      showMoreBtn.textContent = `See more (${Math.min(50, remainingEntries)} more)`;
      document.getElementById('adminMetrics').innerHTML = `
        <div class="metric-card"><h3>Your Total</h3><div class="number">${cms.money(publishedTotal, siteData.currency)}</div></div>
        <div class="metric-card"><h3>All Published</h3><div class="number">${allPublished.length}</div></div>
        <div class="metric-card"><h3>All Total</h3><div class="number">${cms.money(allTotal, siteData.currency)}</div></div>`;
      const mount = document.getElementById('donationList');
      if (!allEntries.length) {
        mount.innerHTML = '<p class="empty-state">No donation entries yet.</p>';
        return;
      }
      mount.innerHTML = allEntries.slice(0, listLimit).map((entry) => {
        const canManage = entry.adminId === currentAdmin.id;
        return `<article class="donation-admin-card">
          <strong>${entry.donorName}</strong>
          <div>${cms.money(entry.amount, siteData.currency)}</div>
          <div class="chip-row"><span class="chip">${entry.status}</span><span class="chip">${entry.adminName || 'Admin'}</span><span class="chip">${cms.imageCount(entry)} image(s)</span></div>
          <div class="action-row">
            ${canManage ? `<button type="button" data-edit="${entry.id}">Edit</button>
            <button type="button" class="danger" data-delete="${entry.id}">Delete</button>` : ''}
            <a class="button secondary" href="donation.html?id=${encodeURIComponent(entry.id)}">View Page</a>
          </div>
        </article>`;
      }).join('');
    }

    async function init() {
      currentAdmin = cms.sessionGet('dipakDonationAdmin');
      if (!currentAdmin) {
        document.getElementById('notLoggedIn').hidden = false;
        return;
      }
      await reloadData();
      const approvedAdmin = (usersData.approved || []).find((user) => user.id === currentAdmin.id);
      if (!approvedAdmin) {
        sessionStorage.removeItem('dipakDonationAdmin');
        document.getElementById('notLoggedIn').hidden = false;
        return;
      }
      currentAdmin = { ...approvedAdmin, token: currentAdmin.token };
      cms.sessionSet('dipakDonationAdmin', currentAdmin);
      document.getElementById('dashboardTitle').textContent = `Donation Form - ${currentAdmin.username}`;
      document.getElementById('workArea').hidden = false;
      clearForm();
      renderDonations();
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('dipakDonationAdmin');
      window.location.href = './admin-data.html';
    });
    document.getElementById('saveDonationBtn').addEventListener('click', saveDonation);
    document.getElementById('newDonationBtn').addEventListener('click', clearForm);
    document.getElementById('showMoreEntriesBtn').addEventListener('click', () => {
      visibleEntryCount += 50;
      renderDonations();
    });
    document.getElementById('donationList').addEventListener('click', (event) => {
      if (event.target.dataset.edit) editDonation(event.target.dataset.edit);
      if (event.target.dataset.delete) deleteDonation(event.target.dataset.delete);
    });
    document.getElementById('profilePreview').addEventListener('input', (event) => {
      if (!profileImage) return;
      if (event.target.dataset.profileFocusX !== undefined) profileImage.focusX = Number(event.target.value);
      if (event.target.dataset.profileFocusY !== undefined) profileImage.focusY = Number(event.target.value);
      if (event.target.dataset.profileZoom !== undefined) profileImage.zoom = Number(event.target.value);
      const card = event.target.closest('.face-preview-card');
      const img = card?.querySelector('.face-frame img');
      if (img) {
        img.style.objectPosition = `${profileImage.focusX || 50}% ${profileImage.focusY || 50}%`;
        img.style.transform = `scale(${profileImage.zoom || 1})`;
      }
    });
    document.getElementById('profileImage').addEventListener('change', async (event) => {
      profileImage = event.target.files[0] ? await fileToDataUrl(event.target.files[0], 900) : null;
      renderPreview();
    });
    document.getElementById('otherImages').addEventListener('change', async (event) => {
      otherImages = await Promise.all([...event.target.files].map((file) => fileToDataUrl(file, 1400)));
      renderPreview();
    });
    init();
  </script>
</body>
</html>
