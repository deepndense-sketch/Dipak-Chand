<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Dipak Chand - Complete Donation List</title>
  <link rel="stylesheet" href="./assets/css/donation-system.css?v=28">
</head>
<body>
  <main class="card">
    <section class="hero">
      <header class="public-site-header">
      <a class="site-title" href="./index.html">Save Dipak Chand</a>
      <nav class="site-actions" aria-label="Main navigation">
        <a class="nav-button" href="./index.html">Home</a>
        <a class="nav-button" href="./about.html">About Dipak</a>
        <a class="nav-button" href="./donate.html">Donate</a>
        <a class="nav-button facebook-share-button" href="#" data-facebook-share>Share on Facebook</a>
      </nav>
      </header>
      <div class="hero-photos">
        <div class="photo photo-left" aria-label="Deepak portrait"></div>
        <div class="photo photo-right" aria-label="Deepak in hospital"></div>
      </div>
      <div class="badge">सहयोगको अपिल</div>
      <h1>जीवन बचाउन अत्यन्त जरुरी सहयोगको अपिल</h1>
      <p class="lead">३५ वर्षीय दीपक चन्दको उपचार सहयोगका लागि सबै आफन्त, साथीभाइ तथा सहयोगी मनहरूमा हार्दिक अनुरोध।</p>
    </section>
    <section class="section">
      <div class="detail-panel">
        <div class="detail-hero">
          <span class="chip" id="listScope">Donation list</span>
          <h1 id="listTitle">Complete Donation List</h1>
          <p class="backend-help" id="listSummary">Loading donations...</p>
        </div>
        <div id="listMount" class="complete-list-grid"></div>
      </div>
    </section>
  </main>

  <script src="./assets/js/donation-system.js?v=17"></script>
  <script>
    const cms = window.DipakCMS;
    const params = new URLSearchParams(location.search);
    const adminId = params.get('admin');
    const mount = document.getElementById('listMount');

    function donationCard(entry, currency, index) {
      const color = entry.color || cms.DONOR_COLORS[index % cms.DONOR_COLORS.length];
      const profileImage = entry.profileThumb || entry.profileImage;
      return `<article class="public-donation-card" style="--donor-color:${color}">
        <a class="donor-photo-link" href="donation.html?id=${encodeURIComponent(entry.id)}" aria-label="${entry.donorName}">
          ${profileImage?.dataUrl
            ? `<img class="donor-photo" src="${profileImage.dataUrl}" alt="${entry.donorName}" loading="lazy" decoding="async">`
            : `<span class="donor-photo donor-photo-fallback">${String(entry.donorName || '?').charAt(0).toUpperCase()}</span>`}
        </a>
        <div class="donor-summary">
          <a href="donation.html?id=${encodeURIComponent(entry.id)}">${entry.donorName}</a>
          <span class="amount">${cms.money(entry.amount, currency)}</span>
        </div>
      </article>`;
    }

    cms.loadAllData().then(({ site, users, donations }) => {
      const currency = site.currency || 'Rs';
      const siteTitle = site.title || cms.DEFAULT_SITE_TITLE || 'Save Dipak Chand';
      const admins = new Map((users.approved || []).map((admin) => [admin.id, admin]));
      let entries = cms.sortDonationsNewest(donations.filter((entry) => entry.status === 'published'));
      if (adminId) entries = entries.filter((entry) => entry.adminId === adminId);
      const total = entries.reduce((sum, entry) => sum + Number(entry.amount || 0), 0);
      const admin = admins.get(adminId);
      document.getElementById('listScope').textContent = admin ? admin.username : 'All admins';
      document.getElementById('listTitle').textContent = admin ? `${admin.username} Donations` : 'Complete Donation List';
      document.title = `${siteTitle} - ${admin ? `${admin.username} Donations` : 'Complete Donation List'}`;
      document.getElementById('listSummary').innerHTML = `${entries.length} entries · ${cms.money(total, currency)} raised <a class="complete-list-link facebook-share-button inline-share-link" href="${cms.facebookShareHref(location.href)}" target="_blank" rel="noopener">Share on Facebook</a>`;
      mount.innerHTML = entries.length
        ? entries.map((entry, index) => donationCard(entry, currency, index)).join('')
        : '<p class="empty-state">No published donations found.</p>';
    }).catch((error) => {
      mount.innerHTML = '<p class="empty-state">Unable to load donation list.</p>';
      console.error(error);
    });
  </script>
</body>
</html>
